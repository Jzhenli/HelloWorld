name: Build Linux App

on:
  push:
    tags:
      - '*-linux/v*'
      - '*-all/v*'
  workflow_dispatch:
    inputs:
      archs:
        description: 'Target architectures'
        required: false
        type: choice
        options: [armv7l, aarch64, 'armv7l,aarch64']
        default: 'armv7l'
      distro:
        description: 'Debian distro (bullseye=GLIBC 2.31, bookworm=GLIBC 2.36)'
        required: false
        type: choice
        options: [bullseye, bookworm]
        default: 'bullseye'
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write   # 允许 run-on-arch-action 缓存镜像到 GHCR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.vars.outputs.app_name }}
      version: ${{ steps.vars.outputs.version }}
      python_version: ${{ steps.vars.outputs.python_version }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Read project config
        id: vars
        run: |
          APP_NAME=$(grep '^name = ' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PYTHON_VERSION=$(grep 'python_version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "python_version=$PYTHON_VERSION" >> $GITHUB_OUTPUT
      - name: Generate matrix
        id: matrix
        run: |
          ARCHS="${{ inputs.archs || 'armv7l' }}"
          ARCHS=$(echo "$ARCHS" | tr -d ' ')
          MATRIX=""
          [[ "$ARCHS" == *"armv7l"* ]] && MATRIX+='{"arch":"armv7l","qemu_arch":"armv7"},'
          [[ "$ARCHS" == *"aarch64"* ]] && MATRIX+='{"arch":"aarch64","qemu_arch":"aarch64"},'
          echo "build_matrix=[${MATRIX%,}]" >> $GITHUB_OUTPUT

  build:
    needs: config
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.build_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Build on ${{ matrix.arch }}
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: ${{ matrix.qemu_arch }}
          distro: ${{ inputs.distro || 'bullseye' }}
          githubToken: ${{ github.token }}
          # 不再使用 install 阶段：docker build 时 QEMU + armhf apt 极不稳定
          # 所有依赖在 run 阶段安装，可加重试；PBS 也在容器内直接下载
          run: |
            set +u
            set -e

            # (1) 换国内镜像源，加速 armhf/aarch64 deb 下载
            if [ -f /etc/apt/sources.list ]; then
              sed -i 's|deb.debian.org|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
              sed -i 's|security.debian.org|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list
            fi
            # bookworm 的 deb822 格式
            if [ -f /etc/apt/sources.list.d/debian.sources ]; then
              sed -i 's|deb.debian.org|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list.d/debian.sources
              sed -i 's|security.debian.org|mirrors.tuna.tsinghua.edu.cn|g' /etc/apt/sources.list.d/debian.sources
            fi

            # (2) apt 安装编译工具链，带 3 次重试（QEMU 网络不稳定）
            install_deps() {
              for i in 1 2 3; do
                apt-get update -qq && \
                apt-get install -y -qq --no-install-recommends \
                  build-essential gcc g++ make patchelf \
                  wget git file ca-certificates tar gzip && \
                return 0
                echo ">>> apt install failed, retry $i in 10s..." >&2
                sleep 10
              done
              echo ">>> apt install failed after 3 retries" >&2
              return 1
            }
            install_deps

            # (3) 在容器内下载 PBS stripped 版（GitHub CDN，比 armhf deb 源稳定）
            PBS_TAG="20260610"
            PY_VER="${{ needs.config.outputs.python_version }}"
            PY_MINOR=$(echo "$PY_VER" | cut -d. -f1,2)

            case "$PY_MINOR" in
              3.10) FULL_PY_VER="3.10.20" ;;
              3.11) FULL_PY_VER="3.11.15" ;;
              3.12) FULL_PY_VER="3.12.13" ;;
              3.13) FULL_PY_VER="3.13.14" ;;
              *) echo "Unsupported Python version: $PY_VER" && exit 1 ;;
            esac

            case "${{ matrix.arch }}" in
              armv7l)  TRIPLE="armv7-unknown-linux-gnueabihf" ;;
              aarch64) TRIPLE="aarch64-unknown-linux-gnu" ;;
            esac

            FILENAME="cpython-${FULL_PY_VER}+${PBS_TAG}-${TRIPLE}-install_only_stripped.tar.gz"
            URL="https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}/${FILENAME}"
            echo "Downloading PBS from $URL"

            # wget 自带重试
            wget -q --tries=3 --retry-connrefused --waitretry=5 "$URL" -O pbs.tar.gz
            ls -lh pbs.tar.gz

            # (4) 解压 PBS 作编译期解释器
            mkdir -p /opt/python
            tar -xzf pbs.tar.gz -C /opt/python --strip-components=1
            ln -sf /opt/python/bin/python3 /usr/bin/python3
            export PATH="/opt/python/bin:$PATH"

            if [ "${{ matrix.arch }}" = "armv7l" ]; then
              export PIP_EXTRA_INDEX_URL="https://www.piwheels.org/simple"
            fi

            # (5) 预填充 pyapp 运行时缓存，让 pyapp build 跳过第二次下载
            CACHE_DIR="/root/.pyapp/cache/runtimes"
            mkdir -p "$CACHE_DIR"
            cp pbs.tar.gz "$CACHE_DIR/$FILENAME"
            echo "Seeded pyapp cache: $CACHE_DIR/$FILENAME"
            ls -lh "$CACHE_DIR/"

            # (6) 安装 pyapp 并构建
            python3 -m pip install --upgrade pip
            python3 -m pip install "pyapp-cli[compile] @ git+https://github.com/Jzhenli/pyapp.git"

            pyapp build linux --arch ${{ matrix.arch }}
            if [[ "${{ inputs.enable_nuitka }}" != "false" ]]; then
              pyapp compile linux
            fi
            pyapp package linux

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ needs.config.outputs.app_name }}-${{ needs.config.outputs.version }}-linux-${{ matrix.arch }}
          path: dist/*.tar.gz

      - name: Summary
        if: always()
        run: |
          echo "### Linux Build (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.config.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Arch**: ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ inputs.enable_nuitka != false }}" >> $GITHUB_STEP_SUMMARY
